severity: Medium
name: '[TEST] WAF-001-T1594 Elevado número de peticiones  desde el mismo origen'
enabled: true
triggerOperator: GreaterThan
query: |-
  let Umbral = 1000;
  AzureDiagnostics
  | where httpMethod_s == "GET"
  | summarize Peticiones = count() by socketIp_s, requestUri_s
  | where Peticiones > Umbral
