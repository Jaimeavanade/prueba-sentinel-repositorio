queryFrequency: PT5M
severity: High
id: "[concat(parameters('workspace'),'/Microsoft.SecurityInsights/be609d9a-eb16-4812-ba65-8e933ce74d42')]"
queryPeriod: PT1H
triggerOperator: GreaterThan
tactics:
- InitialAccess
- Reconnaissance
techniques: []
enabled: true
name: DEL0060 - Ataques de fuerza bruta contra servicios RDP o SSH en VMs
triggerThreshold: 0
query: |-
  MicrosoftAzureBastionAuditLogs
  | where TimeGenerated > ago(7d)
  | where OperationName contains "Failed"
  | summarize FailedAttempts = count(), StartTime = min(TimeGenerated), EndTime = max(TimeGenerated)
      by UserEmail, ClientIpAddress, TargetVMIPAddress, Protocol
  | where FailedAttempts >= 5
  | order by FailedAttempts desc
description: Este caso de uso detecta posibles ataques de fuerza bruta contra accesos administrativos a VMs realizados a través de Microsoft Azure Bastion, identificando un volumen elevado de intentos fallidos asociados a una misma combinación de usuario, IP origen, VM destino y protocolo (RDP/SSH).

