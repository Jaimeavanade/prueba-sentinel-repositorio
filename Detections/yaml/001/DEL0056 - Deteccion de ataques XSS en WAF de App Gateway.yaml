severity: High
description: 'Identifica una coincidencia para un ataque XSS en los registros WAF de App Gateway. El valor del umbral en la consulta se puede cambiar según los requisitos de su infraestructura.Referencias: https://owasp.org/www-project-top-ten/2017/A7_2017-Cross-Site_Scripting_(XSS)'
enabled: true
id: "[concat(parameters('workspace'),'/Microsoft.SecurityInsights/b6396b23-3136-44dc-8307-eccf6793a083')]"
query: |+
  let Threshold = 3;  
  AzureDiagnostics
  | where Category == "ApplicationGatewayFirewallLog"
  | where action_s == "Matched"
  | where Message has "XSS"
  | where clientIp_s !contains "217."
  | project
      transactionId_g,
      hostname_s,
      requestUri_s,
      TimeGenerated,
      clientIp_s,
      Message,
      details_message_s,
      details_data_s
  | join kind = inner(
      AzureDiagnostics
      | where Category == "ApplicationGatewayFirewallLog"
      | where action_s == "Blocked")
      on transactionId_g
  | extend Uri = strcat(hostname_s, requestUri_s)
  | summarize
      Fecha = min(TimeGenerated),
      EndTime = max(TimeGenerated),
      TransactionID = make_set(transactionId_g, 100),
      Message = make_set(Message, 100),
      Detail_Message = make_set(details_message_s, 100),
      Detail_Data = make_set(details_data_s, 100),
      Total_TransactionId = dcount(transactionId_g)
      by clientIp_s, Uri, action_s
  | where Total_TransactionId >= Threshold

tactics:
- InitialAccess
- Execution
queryFrequency: PT5H
triggerOperator: GreaterThan
triggerThreshold: 0
queryPeriod: P1D
name: DEL0056 - Deteccion de ataques XSS en WAF de App Gateway
techniques:
- T1189
- T1203
- T0853

