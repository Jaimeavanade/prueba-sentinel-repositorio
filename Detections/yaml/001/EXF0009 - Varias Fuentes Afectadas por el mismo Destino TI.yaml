queryFrequency: PT5H
severity: High
id: "[concat(parameters('workspace'),'/Microsoft.SecurityInsights/8d45c95a-31d3-4bf8-838f-3116f767837c')]"
queryPeriod: P1D
triggerOperator: GreaterThan
tactics:
- Exfiltration
- CommandAndControl
techniques: []
enabled: true
name: EXF0009 - Varias Fuentes Afectadas por el mismo Destino TI
triggerThreshold: 1
query: |
  let RunTime = 1d; 
  let StartRunTime = 1d; 
  let EndRunTime = StartRunTime - RunTime; 
  let MinAffectedThreshold = 5;
  union isfuzzy=true
  (AzureDiagnostics 
  | where TimeGenerated  between (ago(StartRunTime) .. ago(EndRunTime))
  | where OperationName == "AzureFirewallThreatIntelLog"
  | parse msg_s with * "from " SourceIp ":" SourcePort:int " to " Fqdn ":" DestinationPort:int  "." * "Action: Deny. " ThreatDescription),
  (AZFWThreatIntel
  | where TimeGenerated between (ago(StartRunTime) .. ago(EndRunTime)))
  | summarize TiTrafficCount = count(), dCountSourceIps = dcount(SourceIp), AffectedIps = make_set(SourceIp, 10000) by Fqdn, ThreatDescription
  | where array_length(AffectedIps) > MinAffectedThreshold
  | mv-expand SourceIp = AffectedIps
  | order by TiTrafficCount desc, Fqdn asc, parse_ipv4(tostring(SourceIp)) asc
description: Identifica varias máquinas que intentan llegar al mismo destino bloqueadas por TI en Azure Firewall. Esto puede indicar un ataque a la organización por parte del mismo grupo de ataque.

