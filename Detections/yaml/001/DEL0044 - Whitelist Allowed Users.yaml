queryFrequency: PT5M
severity: High
id: "[concat(parameters('workspace'),'/Microsoft.SecurityInsights/a13414aa-ddff-4eec-a92d-533a06c6d915')]"
queryPeriod: PT30M
triggerOperator: GreaterThan
tactics:
- InitialAccess
- CredentialAccess
techniques: []
enabled: false
name: DEL0044 - Whitelist Allowed Users
triggerThreshold: 0
query: |
  let usuarios_permitidos = datatable(UserPrincipalName: string, deviceId: string)
  [
      "daniel.sanchez-molina@pidpia.onmicrosoft.com", "344fa4bf-8822-4dd7-9610-eca3fbfe63df", 
      "sergio.bernal@pidpia.onmicrosoft.com", "a523c310-9168-4078-b913-ced80dafdec2"
    // "AÑADIR LOS USUARIOS PERMITIDOS QUE FALTAN", "AÑADIR EL DEVICEID",
  ];
  SigninLogs
  //| where TimeGenerated >= ago(5m)  // Ajusta el rango de tiempo según tu necesidad
  | where UserPrincipalName in (usuarios_permitidos
  | project UserPrincipalName) // Filtrar usuarios permitidos
  | extend ParsedDeviceDetail = parse_json(DeviceDetail) // Convertir DeviceDetail a JSON
  | extend ExtractedDeviceId = tostring(ParsedDeviceDetail.deviceId) // Extraer el DeviceId
  | join kind=leftouter usuarios_permitidos on UserPrincipalName // Relacionar con la tabla permitidos
  | extend CoincideDeviceId = iff(ExtractedDeviceId == deviceId, "Sí", "No") // Comparar DeviceId
  | where CoincideDeviceId == "No" or isnull(ExtractedDeviceId) // Si no coincide o está vacío
  | project TimeGenerated, UserPrincipalName, ExtractedDeviceId, deviceId, IPAddress, AuthenticationDetails, DeviceDetail
description: Esta detección señala cuando un usuario de la lista de accesos permitidos se conecta desde un ordenador que no está permitido/registrado.

