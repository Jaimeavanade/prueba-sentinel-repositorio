severity: High
description: Detectar y correlacionar eventos Matched y Blocked del WAF de Azure Application Gateway, especialmente aquellos relacionados con el Anomaly Score, que se acumulan y terminan en un bloqueo por la regla 949110 (Anomaly score exceeded).
enabled: true
id: "[concat(parameters('workspace'),'/Microsoft.SecurityInsights/8f7d2020-6e4b-4835-aa8d-e3810b3fcb2d')]"
query: |+
  AzureDiagnostics
  | where Category == "ApplicationGatewayFirewallLog"
  | where action_s in ("Blocked", "Matched")
  | where clientIp_s !in ("217.14.34.113", "163.116.243.101", "217.14.40.189")
  // | where ruleId_s !in ("980130", "980131")  // se ignora reglas genéricas
  | where ruleId_s == "949110"
  | extend esBloqueoFinal = iff(ruleId_s == "949110", "Sí", "No")
  | project
      TimeGenerated,
      clientIp_s,
      hostname_s,
      requestUri_s,
      action_s,
      ruleId_s,
      esBloqueoFinal,
      Message,
      details_message_s,
      ruleSetType_s,
      details_file_s
  | summarize Hits=count(), Fecha=arg_max(TimeGenerated, *), PrimerHit=min(TimeGenerated)by clientIp_s, ruleId_s
  | where Hits >= 5
  | order by PrimerHit

tactics:
- Reconnaissance
- InitialAccess
- DefenseEvasion
queryFrequency: PT5H
triggerOperator: GreaterThan
triggerThreshold: 0
queryPeriod: P1D
name: REC0031 - WAF - Monitorizacion de Eventos Matched y Bloqueo 949110
techniques: []

