description: Detecta fallos a la hora de ejecutar reglas del tipo NTR.
id: "[concat(parameters('workspace'),'/Microsoft.SecurityInsights/5268b651-d99e-46af-800b-063c67aa3e09')]"
query: |-
  SentinelHealth
  | where OperationName == "NRT analytics rule run"
  | where Status == "Failure"
  | project TimeGenerated, Object = SentinelResourceName, EventResult = Status, EventMessage = Description
queryFrequency: PT10M
severity: Low
queryPeriod: PT10M
name: '[GEN][MIN] AS-SNTL-039 Fallo de ejecución de regla NTR'
triggerOperator: GreaterThan
enabled: true
triggerThreshold: 0
techniques: []
tactics: []

