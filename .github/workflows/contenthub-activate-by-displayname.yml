name: Content Hub - List Installed & Catalog Content Items

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  list-contenthub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List Content Hub installed & catalog items
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          ./scripts/10-contenthub-list-installed-and-catalog-items.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -ResourceGroupName "${{ vars.RESOURCE_GROUP }}" `
            -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
            -OutReportJson "Solutions/contenthub-installed-items-report.json"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: contenthub-installed-items-report
          path: Solutions/contenthub-installed-items-report.json
