name: Export Analytics Rule (Content Hub -> Repo)

on:
  workflow_dispatch:
    inputs:
      content_name:
        description: "Content name EXACTO en Sentinel (ej: Brute force attack against a Cloud PC)"
        required: true
        type: string
      commit_message:
        description: "Mensaje de commit (opcional)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  export_analytics_rule:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      WORKSPACE_NAME: ${{ vars.WORKSPACE_NAME }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }} # para el script (además del login)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Export analytics rule from Sentinel
        id: export
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            ./scripts/export-analyticsrule-from-contenthub.ps1 -ContentName "${{ github.event.inputs.content_name }}"

      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "Analytics rules"

          if git diff --cached --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi

          MSG="${{ github.event.inputs.commit_message }}"
          if [ -z "$MSG" ]; then
            MSG="Export analytics rule: ${{ github.event.inputs.content_name }}"
          fi

          git commit -m "$MSG"
          git push
