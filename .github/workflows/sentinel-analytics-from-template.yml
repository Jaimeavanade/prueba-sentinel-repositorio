name: Sentinel - Analytics Rule Templates (List/Create)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "list = listar Rule templates | create = crear Active rule desde template"
        required: true
        default: "list"
        type: choice
        options:
          - list
          - create
      templateDisplayName:
        description: "(create) displayName de la plantilla (exacto o contiene)"
        required: false
        type: string
      matchMode:
        description: "(create) exact | contains"
        required: false
        default: "contains"
        type: choice
        options:
          - exact
          - contains
      templateId:
        description: "(create) ID exacto del template (recomendado)"
        required: false
        type: string
      newRuleDisplayName:
        description: "(create) Nombre opcional para la nueva regla activa"
        required: false
        type: string
      enabled:
        description: "(create) habilitar la regla (true/false)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

jobs:
  manage:
    runs-on: ubuntu-latest

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      SENTINEL_RESOURCE_GROUP: ${{ secrets.SENTINEL_RESOURCE_GROUP }}
      SENTINEL_WORKSPACE_NAME: ${{ secrets.SENTINEL_WORKSPACE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # LIST
      # -----------------------------
      - name: List templates (and export CSV)
        if: ${{ inputs.action == 'list' }}
        shell: pwsh
        run: |
          ./scripts/sentinel-analytics-rule-templates.ps1 `
            -Action list `
            -OutFile templates.csv
          echo "Templates exported to templates.csv"

      - name: Upload templates.csv
        if: ${{ inputs.action == 'list' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-rule-templates
          path: templates.csv

      # -----------------------------
      # CREATE
      # -----------------------------
      - name: Create rule from template
        if: ${{ inputs.action == 'create' }}
        shell: pwsh
        run: |
          $enabledBool = [System.Convert]::ToBoolean("${{ inputs.enabled }}")

          # Construcción segura de argumentos opcionales
          $optional = @()
          if ("${{ inputs.templateId }}") {
            $optional += @("-TemplateId", "${{ inputs.templateId }}")
          }
          if ("${{ inputs.templateDisplayName }}") {
            $optional += @("-TemplateDisplayName", "${{ inputs.templateDisplayName }}")
          }
          if ("${{ inputs.newRuleDisplayName }}") {
            $optional += @("-NewRuleDisplayName", "${{ inputs.newRuleDisplayName }}")
          }

          # Llamada explícita y limpia: evita el bug de "-Action -Action" que disparaba el ValidateSet [1](https://teams.microsoft.com/l/meeting/details?eventId=AAMkAGE4ODZlODM3LTA4MzQtNDY4YS05OTEyLTdiMTY3ZTA0MTUzMAFRAAgI3pET8vkAAEYAAAAA-inrnGSHhES9IRwtrfBJDwcA9u7cx1atf06HiZjL0Om-aQAAAAABDQAA9u7cx1atf06HiZjL0Om-aQAFtxnC0gAAEA%3d%3d)
          ./scripts/sentinel-analytics-rule-templates.ps1 `
            -Action create `
            -MatchMode "${{ inputs.matchMode }}" `
            -Enabled $enabledBool `
            @optional
