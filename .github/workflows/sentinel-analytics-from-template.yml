name: Sentinel - Analytics Rule Templates (List/Create)

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        default: list
        type: choice
        options: [list, create]
      templateId:
        required: false
        type: string
      templateDisplayName:
        required: false
        type: string
      matchMode:
        required: false
        default: contains
        type: choice
        options: [exact, contains]
      newRuleDisplayName:
        required: false
        type: string
      enabled:
        required: false
        default: "true"
        type: choice
        options: ["true","false"]

permissions:
  id-token: write
  contents: read

jobs:
  sentinel:
    runs-on: ubuntu-latest

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      SENTINEL_RESOURCE_GROUP:  ${{ secrets.SENTINEL_RESOURCE_GROUP }}
      SENTINEL_WORKSPACE_NAME:  ${{ secrets.SENTINEL_WORKSPACE_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Sentinel Script
        shell: pwsh
        run: |
          $enabled = [System.Convert]::ToBoolean("${{ inputs.enabled }}")

          ./scripts/sentinel-analytics-rule-templates.ps1 `
            -Action "${{ inputs.action }}" `
            -TemplateId "${{ inputs.templateId }}" `
            -TemplateDisplayName "${{ inputs.templateDisplayName }}" `
            -MatchMode "${{ inputs.matchMode }}" `
            -NewRuleDisplayName "${{ inputs.newRuleDisplayName }}" `
            -Enabled $enabled
