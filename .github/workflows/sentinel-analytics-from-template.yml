name: Sentinel - Analytics Rule Templates (List/Create)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        type: choice
        options:
          - list
          - create
      templateId:
        description: "TemplateId (solo create)"
        required: false
        default: ""
      templateDisplayName:
        description: "DisplayName (opcional)"
        required: false
        default: ""
      matchMode:
        description: "Modo de matching"
        required: true
        default: "contains"
        type: choice
        options:
          - contains
          - equals
          - startswith
      enabled:
        description: "Habilitar la regla (solo create)"
        required: true
        default: "true"

permissions:
  id-token: write
  contents: read

jobs:
  sentinel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Sentinel Script
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $enabled = [System.Convert]::ToBoolean("${{ inputs.enabled }}")

          if ("${{ inputs.action }}" -eq "list") {

            ./scripts/sentinel-analytics-rule-templates.ps1 `
              -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
              -ResourceGroup "${{ vars.SENTINEL_RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.SENTINEL_WORKSPACE_NAME }}" `
              -Action list `
              -TemplateDisplayName "${{ inputs.templateDisplayName }}" `
              -MatchMode "${{ inputs.matchMode }}" |
            Out-File -Encoding utf8 sentinel-templates.json

          } else {

            ./scripts/sentinel-analytics-rule-templates.ps1 `
              -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
              -ResourceGroup "${{ vars.SENTINEL_RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.SENTINEL_WORKSPACE_NAME }}" `
              -Action create `
              -TemplateId "${{ inputs.templateId }}" `
              -Enabled $enabled
          }

      # ✅ SOLO en modo LIST se sube artifact
      - name: Upload templates artifact
        if: inputs.action == 'list'
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-analytics-rule-templates
          path: sentinel-templates.json
