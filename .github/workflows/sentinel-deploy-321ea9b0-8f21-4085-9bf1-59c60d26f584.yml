name: Deploy Content to log-sentinel-segittur-014 [321ea9b0-8f21-4085-9bf1-59c60d26f584]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-321ea9b0-8f21-4085-9bf1-59c60d26f584.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-321ea9b0-8f21-4085-9bf1-59c60d26f584.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'RG-log-sentinel-segittur-014'
      workspaceName: 'log-sentinel-segittur-014'
      workspaceId: 'c7a25ec0-c362-4cf1-b612-24558574c6ee'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule'
      branch: 'main'
      sourceControlId: '321ea9b0-8f21-4085-9bf1-59c60d26f584'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_321ea9b08f2140859bf159c60d26f584 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_321ea9b08f2140859bf159c60d26f584 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_321ea9b08f2140859bf159c60d26f584 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_321ea9b08f2140859bf159c60d26f584 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_321ea9b08f2140859bf159c60d26f584 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_321ea9b08f2140859bf159c60d26f584 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_321ea9b08f2140859bf159c60d26f584 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_321ea9b08f2140859bf159c60d26f584 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_321ea9b08f2140859bf159c60d26f584 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-321ea9b0-8f21-4085-9bf1-59c60d26f584.ps1