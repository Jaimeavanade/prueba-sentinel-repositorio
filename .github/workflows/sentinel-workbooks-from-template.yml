name: Sentinel – Workbooks (List / Create)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        type: choice
        required: true
        options: [list, create]
        default: create

      templateId:
        description: "TemplateId del workbook (solo para create)"
        required: false
        default: ""

      workbookDisplayName:
        description: "DisplayName objetivo (opcional)"
        required: false
        default: ""

      location:
        description: "Location del workbook"
        required: true
        default: francecentral

      updateIfExists:
        description: "Actualizar el workbook si ya existe"
        type: boolean
        default: false

      verbose:
        description: "Logs detallados"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Run Sentinel workbook script
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $args = @(
            "-Action", "${{ inputs.action }}",
            "-SubscriptionId", "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "-ResourceGroupName", "${{ vars.SENTINEL_RESOURCE_GROUP }}",
            "-WorkspaceName", "${{ vars.SENTINEL_WORKSPACE_NAME }}",
            "-Location", "${{ inputs.location }}"
          )

          if ("${{ inputs.templateId }}" -ne "") {
            $args += @("-TemplateId", "${{ inputs.templateId }}")
          }

          if ("${{ inputs.workbookDisplayName }}" -ne "") {
            $args += @("-WorkbookDisplayName", "${{ inputs.workbookDisplayName }}")
          }

          if ("${{ inputs.updateIfExists }}" -eq "true") {
            $args += "-UpdateIfExists"
          }

          if ("${{ inputs.verbose }}" -eq "true") {
            $args += "-VerboseOutput"
          }

          if ("${{ inputs.action }}" -eq "list") {
            $args += @("-CsvOutputPath", "artifacts/workbook-templates.csv")
          }

          Write-Host "➡️ Ejecutando sentinel-workbook-templates.ps1 $($args -join ' ')"
          pwsh ./scripts/sentinel-workbook-templates.ps1 @args

      - name: Upload CSV (solo list)
        if: ${{ inputs.action == 'list' }}
        uses: actions/upload-artifact@v4
        with:
          name: workbook-templates
          path: artifacts/workbook-templates.csv
