name: Convert Analytics JSON to YAML

on:
  workflow_dispatch:

# ✅ Permisos necesarios para hacer push a main
permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install powershell-yaml module
      shell: pwsh
      run: |
        Install-Module powershell-yaml -Force -Scope CurrentUser

    - name: Convert Azure Sentinel 001 analytics rules
      shell: pwsh
      run: |
        ./Scripts/Convert-AnalyticsJsonToYaml.ps1 `
          -InputFile "Detections/Azure_Sentinel_001analytics_rules.json"

    - name: Convert Azure Sentinel 002 analytics rules
      shell: pwsh
      run: |
        ./Scripts/Convert-AnalyticsJsonToYaml.ps1 `
          -InputFile "Detections/Azure_Sentinel002_analytics_rules.json"

    - name: Commit and push generated YAML files
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add Detections/Custom/YAML
        git commit -m "Convert Sentinel analytics JSON to YAML" || echo "No changes to commit"
        git push
