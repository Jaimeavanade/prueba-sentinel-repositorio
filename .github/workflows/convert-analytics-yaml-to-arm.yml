name: Convert Analytics Rules (Custom YAML -> ARM JSON)

on:
  push:
    branches: [ main ]
    paths:
      - 'Detections/Custom/YAML/**.yml'
      - 'Detections/Custom/YAML/**.yaml'
      - 'Scripts/Convert-AnalyticsYamlToArmJson.ps1'
      - '.github/workflows/convert-analytics-yaml-to-arm.yml'
  workflow_dispatch:

jobs:
  convert-analytics-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell YAML module
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
            Install-Module powershell-yaml -Scope CurrentUser -Force -Repository PSGallery
          }

      - name: Convert Custom Analytics Rules (YAML -> ARM JSON)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pwsh -File ./Scripts/Convert-AnalyticsYamlToArmJson.ps1

      - name: Upload ARM JSON artifacts + report
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-custom-analytics-rules-arm
          path: |
            Detections/Custom/ARM
            conversion_report.txt
