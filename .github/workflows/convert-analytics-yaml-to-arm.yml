name: Convert Analytics YAML to Repos-compatible ARM JSON

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Detections/Custom/YAML/**"
      - "Scripts/Convert-AnalyticsYamlToArmJson.ps1"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell YAML module
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber

      - name: Convert YAML to ARM (overwrite)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $yamlRoot = "Detections/Custom/YAML"
          $armRoot  = "Detections/Custom/ARM"

          if (-not (Test-Path $yamlRoot)) {
            Write-Host "No YAML found"
            exit 0
          }

          $yamlRootPath = (Resolve-Path $yamlRoot).Path

          Get-ChildItem $yamlRoot -Recurse -Include *.yaml, *.yml | ForEach-Object {
            $rel = $_.FullName.Substring($yamlRootPath.Length).TrimStart('/','\')
            $outDir = Join-Path $armRoot (Split-Path $rel -Parent)
            New-Item -ItemType Directory -Force -Path $outDir | Out-Null

            $outFile = Join-Path $outDir ($_.BaseName + ".json")

            Write-Host "▶ $_ -> $outFile"

            pwsh -File Scripts/Convert-AnalyticsYamlToArmJson.ps1 `
              -InputYamlPath $_.FullName `
              -OutputJsonPath $outFile `
              -RuleIdSeed $rel
          }

      - name: Commit ARM files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Detections/Custom/ARM/**/*.json || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: regenerate Sentinel Analytics ARM (Repositories compatible)"
          git push
