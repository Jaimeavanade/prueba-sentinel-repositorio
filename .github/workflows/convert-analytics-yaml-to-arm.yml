name: Convert Analytics YAML to Repos-compatible ARM JSON

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Detections/Custom/YAML/**"
      - "Scripts/Convert-AnalyticsYamlToArmJson.ps1"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell YAML module (pinned)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module powershell-yaml -RequiredVersion 0.4.11 -Scope CurrentUser -Force -AllowClobber
          Import-Module powershell-yaml -Force

      - name: Convert Analytics Rules (YAML → ARM JSON)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $yamlRoot = "Detections/Custom/YAML"
          $armRoot  = "Detections/Custom/ARM"

          if (-not (Test-Path $yamlRoot)) {
            Write-Host "No YAML files found in $yamlRoot"
            exit 0
          }

          $yamlRootPath = (Resolve-Path $yamlRoot).Path

          Get-ChildItem $yamlRoot -Recurse -Include *.yaml, *.yml | ForEach-Object {

            $relPath = $_.FullName.Substring($yamlRootPath.Length).TrimStart('/','\')
            $targetDir = Join-Path $armRoot (Split-Path $relPath -Parent)

            New-Item -ItemType Directory -Force -Path $targetDir | Out-Null

            $outFile = Join-Path $targetDir ($_.BaseName + ".json")

            Write-Host "▶ $relPath -> $outFile"

            pwsh -File Scripts/Convert-AnalyticsYamlToArmJson.ps1 `
              -InputYamlPath $_.FullName `
              -OutputJsonPath $outFile `
              -RuleIdSeed $relPath
          }

      - name: Commit generated ARM files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Detections/Custom/ARM/**/*.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: regenerate Analytics Rules ARM (Repositories compatible)"
          git push
