name: Convert Analytics YAML to Repos-compatible ARM JSON

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Detections/Custom/YAML/**.yml"
      - "Detections/Custom/YAML/**.yaml"
      - "Scripts/Convert-AnalyticsYamlToArmJson.ps1"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: |
          $PSVersionTable

      - name: Install required PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module powershell-yaml -Scope CurrentUser -Force -AllowClobber
          Get-Module -ListAvailable powershell-yaml

      - name: Convert Analytics Rules (YAML → ARM JSON)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $yamlRoot = "Detections/Custom/YAML"
          $outRoot  = "Detections/Custom/ARM"

          if (-not (Test-Path $yamlRoot)) {
            Write-Host "⚠️ YAML folder not found: $yamlRoot"
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $outRoot | Out-Null

          Get-ChildItem $yamlRoot -Recurse -Include *.yaml, *.yml | ForEach-Object {
            $inFile = $_.FullName
            $baseName = [IO.Path]::GetFileNameWithoutExtension($_.Name)
            $outFile = Join-Path $outRoot ($baseName + ".json")

            Write-Host "▶ Converting $inFile"
            pwsh -File Scripts/Convert-AnalyticsYamlToArmJson.ps1 `
              -InputYamlPath $inFile `
              -OutputJsonPath $outFile `
              -RuleIdSeed $inFile
          }

      - name: Commit generated ARM templates
        shell: bash
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Detections/Custom/ARM/*.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: generate Repos-compatible ARM JSON for analytics rules"
          git push
