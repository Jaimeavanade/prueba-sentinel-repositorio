name: Sync Content Hub Solutions from Official Repo (INLINE)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  id-token: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Debug working directory
        shell: bash
        run: |
          echo "PWD:"
          pwd
          echo "ROOT CONTENT:"
          ls -la
          echo "Solutions folder:"
          ls -la Solutions || true

      - name: Sync Content Hub solutions -> Solutions/ (INLINE POWERSHELL)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "=== INICIO SYNC CONTENT HUB ===" -ForegroundColor Cyan

          # -------------------------------
          # PARAMETROS
          # -------------------------------
          $SubscriptionId      = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          $ResourceGroupName   = "${{ secrets.SENTINEL_RESOURCE_GROUP }}"
          $WorkspaceName       = "${{ secrets.SENTINEL_WORKSPACE_NAME }}"

          # ✅ DESTINO NUEVO: Solutions (NO Detections/Solutions)
          $DestinationRoot     = "Solutions"

          $AzureSentinelRepo   = "https://github.com/Azure/Azure-Sentinel.git"
          $AzureSentinelBranch = "master"

          # -------------------------------
          # ALIAS MAP (DisplayName Content Hub -> folder oficial en GitHub)
          # -------------------------------
          $AliasMap = @{
            "Azure Web Application Firewall" = "Azure Web Application Firewall (WAF)"
            "Microsoft Sentinel - Continuous Threat Monitoring for GitHub" = "GitHub"
          }

          # -------------------------------
          # FUNCIONES
          # -------------------------------
          function Ensure-Dir($Path) {
            if (-not (Test-Path $Path)) {
              New-Item -ItemType Directory -Path $Path | Out-Null
            }
          }

          function Normalize($s) {
            if (-not $s) { return "" }
            return ([regex]::Replace($s.ToLower(), "[^a-z0-9]", ""))
          }

          # -------------------------------
          # TOKEN ARM
          # -------------------------------
          Write-Host "Obteniendo token ARM..."
          $token = az account get-access-token `
            --resource https://management.azure.com/ `
            --query accessToken -o tsv

          if (-not $token) { throw "No se pudo obtener token ARM" }

          # -------------------------------
          # LISTAR SOLUCIONES INSTALADAS (contentPackages)
          # -------------------------------
          Write-Host "Listando soluciones instaladas en Content Hub..."

          $uri = "https://management.azure.com/subscriptions/$SubscriptionId/resourceGroups/$ResourceGroupName/providers/Microsoft.OperationalInsights/workspaces/$WorkspaceName/providers/Microsoft.SecurityInsights/contentPackages?api-version=2025-09-01"
          $headers = @{ Authorization = "Bearer $token" }

          $packages  = (Invoke-RestMethod -Method GET -Uri $uri -Headers $headers).value
          $solutions = $packages | Where-Object { $_.properties.displayName }

          Write-Host "Soluciones detectadas: $($solutions.Count)" -ForegroundColor Green
          if ($solutions.Count -eq 0) { Write-Warning "No hay soluciones instaladas. Fin."; exit 0 }

          # -------------------------------
          # SOLUCIONES OFICIALES (listado de carpetas /Solutions)
          # -------------------------------
          Write-Host "Leyendo soluciones oficiales de Azure-Sentinel..."

          $official = Invoke-RestMethod `
            -Headers @{ "User-Agent" = "sentinel-sync" } `
            -Uri "https://api.github.com/repos/Azure/Azure-Sentinel/contents/Solutions?ref=$AzureSentinelBranch"

          $officialFolders = $official | Where-Object type -eq dir | Select-Object -ExpandProperty name

          # -------------------------------
          # MAPEO (alias + exact + normalización + contains)
          # -------------------------------
          $mapped = New-Object System.Collections.Generic.List[string]

          foreach ($s in $solutions) {
            $dn = $s.properties.displayName

            # 0) Alias directo si existe
            if ($AliasMap.ContainsKey($dn)) {
              $aliasFolder = $AliasMap[$dn]
              if ($officialFolders -contains $aliasFolder) {
                $mapped.Add($aliasFolder)
                Write-Host "ALIAS MATCH: $dn -> $aliasFolder" -ForegroundColor Green
                continue
              } else {
                Write-Warning "ALIAS definido pero NO existe carpeta oficial: $dn -> $aliasFolder"
              }
            }

            # 1) Match exacto
            if ($officialFolders -contains $dn) {
              $mapped.Add($dn)
              Write-Host "EXACT MATCH: $dn -> $dn" -ForegroundColor Green
              continue
            }

            # 2) Match normalizado
            $n = Normalize $dn
            $match = $officialFolders | Where-Object { (Normalize $_) -eq $n } | Select-Object -First 1
            if ($match) {
              $mapped.Add($match)
              Write-Host "NORMALIZED MATCH: $dn -> $match" -ForegroundColor Green
              continue
            }

            # 3) Fallback contains
            $matchContains = $officialFolders | Where-Object {
              (Normalize $dn) -like "*$(Normalize $_)*" -or (Normalize $_) -like "*$(Normalize $dn)*"
            } | Select-Object -First 1

            if ($matchContains) {
              $mapped.Add($matchContains)
              Write-Host "CONTAINS MATCH: $dn -> $matchContains" -ForegroundColor Green
              continue
            }

            Write-Warning "NO MATCH: $dn"
          }

          $mapped = $mapped | Sort-Object -Unique

          if ($mapped.Count -eq 0) {
            Write-Warning "No se pudo mapear ninguna solución. Fin."
            exit 0
          }

          Write-Host "Soluciones mapeadas a copiar: $($mapped.Count)" -ForegroundColor Cyan
          $mapped | ForEach-Object { Write-Host " - $_" }

          # -------------------------------
          # CLONE SPARSE del repo oficial SOLO para las soluciones mapeadas
          # -------------------------------
          $tmp = Join-Path $env:RUNNER_TEMP ("azure-sentinel-" + [guid]::NewGuid())
          Write-Host "Clonando Azure-Sentinel (sparse) en $tmp"

          git clone --depth 1 --filter=blob:none --no-checkout `
            --branch $AzureSentinelBranch `
            $AzureSentinelRepo $tmp | Out-Null

          Push-Location $tmp
          git sparse-checkout init --cone | Out-Null

          $paths = $mapped | ForEach-Object { "Solutions/$_" }
          git sparse-checkout set $paths | Out-Null
          git checkout $AzureSentinelBranch | Out-Null
          Pop-Location

          # -------------------------------
          # COPIA DE CONTENIDO (solo carpetas solicitadas)
          # -------------------------------
          $foldersToCopy = @(
            "Analytic Rules",
            "Automation Rules",
            "Hunting Queries",
            "Parsers",
            "Playbooks",
            "Workbooks"
          )

          Ensure-Dir $DestinationRoot

          foreach ($sol in $mapped) {
            $srcSol = Join-Path $tmp "Solutions/$sol"
            $dstSol = Join-Path $DestinationRoot $sol

            Ensure-Dir $dstSol
            Write-Host "Copiando solución: $sol" -ForegroundColor Cyan

            foreach ($f in $foldersToCopy) {
              if (Test-Path "$srcSol/$f") {
                Ensure-Dir "$dstSol/$f"
                Copy-Item "$srcSol/$f/*" "$dstSol/$f" -Recurse -Force
                Write-Host "  OK -> $f"
              } else {
                Write-Host "  SKIP -> $f (no existe)"
              }
            }
          }

          Write-Host "=== FIN SYNC CONTENT HUB ===" -ForegroundColor Green

      - name: Commit changes (if any)
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # ✅ ahora añadimos Solutions (NO Detections/Solutions)
            git add Solutions

            git commit -m "Sync Content Hub solutions from Azure-Sentinel -> Solutions/"
            git push
          else
            echo "No changes to commit."
          fi

