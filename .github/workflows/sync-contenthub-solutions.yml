name: Sync Content Hub Solutions from Official Repo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"  # Lunes 03:00 UTC (ajusta si quieres)

permissions:
  id-token: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync installed Content Hub solutions -> Detections/Solutions
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          ./Scripts/Sync-ContentHubSolutionsFromOfficialRepo.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -ResourceGroupName "${{ secrets.SENTINEL_RESOURCE_GROUP }}" `
            -WorkspaceName "${{ secrets.SENTINEL_WORKSPACE_NAME }}" `
            -DestinationRoot "Detections/Solutions" `
            -AzureSentinelBranch "master"

      - name: Commit changes (if any)
        shell: bash
        run: |
          set -e
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Detections/Solutions
            git commit -m "Sync installed Content Hub solutions from Azure-Sentinel official repo"
            git push
          else
            echo "No changes to commit."
          fi
