name: Content Hub - Installed solutions & items report

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: false

      - name: Azure CLI - set subscription
        run: az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Generate installed Content Hub report (TXT) -> Solutions/
        shell: pwsh
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          WORKSPACE_NAME: ${{ vars.WORKSPACE_NAME }}
        run: |
          ./scripts/01-export-installed-contenthub.ps1

      - name: Verify report exists (avoid empty artifact)
        run: |
          test -f Solutions/contenthub-installed-report.txt
          test -s Solutions/contenthub-installed-report.txt

      - name: Show report preview (solution + content names)
        run: |
          echo "----- Preview (first 40 lines) -----"
          head -n 40 Solutions/contenthub-installed-report.txt

      - name: Commit report into repo (Solutions/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Solutions/contenthub-installed-report.txt
          git commit -m "chore: update Content Hub installed report" || echo "No changes to commit"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: contenthub-installed-report
          path: Solutions/contenthub-installed-report.txt
