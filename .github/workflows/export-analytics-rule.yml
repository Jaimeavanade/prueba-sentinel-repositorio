name: Export Analytics Rule from Content Hub

on:
  workflow_dispatch:
    inputs:
      content_name:
        description: "DisplayName exacto de la Analytics Rule (content_name)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Export Analytics Rule
        shell: pwsh
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          WORKSPACE_NAME: ${{ vars.WORKSPACE_NAME }}
          CONTENT_NAME: ${{ inputs.content_name }}
        run: |
          ./scripts/02-export-analytics-rule.ps1

      - name: Commit rule to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Analytics rules"
          git commit -m "feat: export analytics rule '${{ inputs.content_name }}'" || echo "No changes"
          git push
