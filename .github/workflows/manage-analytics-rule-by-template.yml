name: Manage Sentinel Analytics Rule (Enable/Disable/List Templates)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "enable | disable | list"
        required: true
        type: choice
        options: [ enable, disable, list ]
      ruleName:
        description: "Para enable/disable: displayName (si no existe, usa pickCandidate o templateId)"
        required: false
        type: string
      search:
        description: "Para list: filtro contains (ej: admin, local group, WAF, etc.)"
        required: false
        type: string
      templateId:
        description: "Para enable: templateId (GUID) si lo tienes"
        required: false
        type: string
      pickCandidate:
        description: "Para enable: si no hay match, elige candidato 1..N"
        required: false
        default: "0"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  manage-rule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Run
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"

            $sub = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            $ws  = "${{ secrets.SENTINEL_WORKSPACE_NAME }}"
            $rg  = "${{ secrets.SENTINEL_RESOURCE_GROUP }}"

            if ([string]::IsNullOrWhiteSpace($sub)) { throw "Secret AZURE_SUBSCRIPTION_ID vacío o no definido." }
            if ([string]::IsNullOrWhiteSpace($ws))  { throw "Secret SENTINEL_WORKSPACE_NAME vacío o no definido." }
            if ([string]::IsNullOrWhiteSpace($rg))  { throw "Secret SENTINEL_RESOURCE_GROUP vacío o no definido." }

            Set-AzContext -SubscriptionId $sub | Out-Null

            $action        = "${{ github.event.inputs.action }}"
            $ruleName      = "${{ github.event.inputs.ruleName }}"
            $search        = "${{ github.event.inputs.search }}"
            $templateId    = "${{ github.event.inputs.templateId }}"
            $pickCandidate = [int]("${{ github.event.inputs.pickCandidate }}")

            $scriptPath = Join-Path $env:GITHUB_WORKSPACE "scripts/Activate-Or-Disable-RuleFromTemplate.ps1"
            if (-not (Test-Path $scriptPath)) { throw "No existe el script en: $scriptPath" }

            & $scriptPath `
              -SubscriptionId $sub `
              -ResourceGroupName $rg `
              -WorkspaceName $ws `
              -Action $action `
              -RuleName $ruleName `
              -Search $search `
              -TemplateId $templateId `
              -PickCandidate $pickCandidate
