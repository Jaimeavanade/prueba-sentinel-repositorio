name: Export Content Hub Item to Repo (deployable resources)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        type: choice
        options:
          - "export-item"
          - "list-installed-solutions"
          - "list-installed-templates"
      content_name:
        description: "Content name (Display name exacto en Azure Portal). Solo para export-item"
        required: false
        type: string
      content_type:
        description: "Content type (como aparece en el portal). Solo para export-item (recomendado si hay ambigüedad)"
        required: false
        type: choice
        options:
          - ""
          - "Analytics rule"
          - "Hunting query"
          - "Parser"
          - "Workbook"
      search:
        description: "Filtro de búsqueda opcional para listados"
        required: false
        type: string
        default: ""
      top:
        description: "Número máximo de resultados en listados"
        required: false
        type: string
        default: "200"

permissions:
  id-token: write
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Sanity check paths
        shell: bash
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la
          ls -la "$GITHUB_WORKSPACE" || true
          ls -la "$GITHUB_WORKSPACE/scripts" || true

      - name: Run
        shell: pwsh
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SENTINEL_RESOURCE_GROUP: ${{ vars.SENTINEL_RESOURCE_GROUP }}
          SENTINEL_WORKSPACE_NAME: ${{ vars.SENTINEL_WORKSPACE_NAME }}
        run: |
          $ErrorActionPreference = "Stop"

          $scriptPath = Join-Path $env:GITHUB_WORKSPACE "scripts/export-contenthub-item.ps1"
          if (-not (Test-Path $scriptPath)) {
            throw "No existe el script en: $scriptPath. Revisa que esté commiteado en scripts/export-contenthub-item.ps1"
          }

          $action = "${{ github.event.inputs.action }}"
          $search = "${{ github.event.inputs.search }}"
          $top = "${{ github.event.inputs.top }}"

          if ($action -eq "list-installed-solutions") {
            pwsh -File $scriptPath -ListInstalledSolutions -Search $search -Top ([int]$top)
            exit 0
          }

          if ($action -eq "list-installed-templates") {
            pwsh -File $scriptPath -ListInstalledTemplates -Search $search -Top ([int]$top)
            exit 0
          }

          # export-item
          $cn = "${{ github.event.inputs.content_name }}"
          if (-not $cn -or $cn.Trim().Length -eq 0) {
            throw "Para 'export-item' debes rellenar content_name."
          }

          $ct = "${{ github.event.inputs.content_type }}"

          pwsh -File $scriptPath -ContentName $cn -ContentType $ct

      - name: Commit & Push if changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi

          git commit -m "Export Sentinel content: ${{ github.event.inputs.content_name }}"
          git push
