name: Export Sentinel Content Hub Item (to Repo)

on:
  workflow_dispatch:
    inputs:
      contentName:
        description: 'Content name (exacto como en Azure Portal). Ej: Brute force attack against a Cloud PC'
        required: true
        type: string
      contentType:
        description: 'Content type (exacto como en Azure Portal)'
        required: true
        type: choice
        options:
          - Analytics rule
          - Hunting query
          - Parser
          - Workbook
          - Playbook
      overwrite:
        description: 'Sobrescribir si el fichero ya existe'
        required: false
        type: boolean
        default: true
      commitChanges:
        description: 'Hacer commit + push de los cambios'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

env:
  SENTINEL_RESOURCE_GROUP: ${{ vars.SENTINEL_RESOURCE_GROUP }}
  SENTINEL_WORKSPACE_NAME: ${{ vars.SENTINEL_WORKSPACE_NAME }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Recomendado: azure/login con OIDC (federated credentials)
      # Necesitarás además AZURE_CLIENT_ID y AZURE_TENANT_ID como secrets/vars.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run export script
        shell: pwsh
        run: |
          ./scripts/export-contenthub-item.ps1 `
            -ContentName "${{ inputs.contentName }}" `
            -ContentType "${{ inputs.contentType }}" `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -ResourceGroupName "${{ env.SENTINEL_RESOURCE_GROUP }}" `
            -WorkspaceName "${{ env.SENTINEL_WORKSPACE_NAME }}" `
            -Overwrite:("${{ inputs.overwrite }}" -eq "true")

      - name: Commit & Push
        if: ${{ inputs.commitChanges }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          git commit -m "Export Sentinel content: ${{ inputs.contentType }} - ${{ inputs.contentName }}" || echo "Nothing to commit"
          git push
