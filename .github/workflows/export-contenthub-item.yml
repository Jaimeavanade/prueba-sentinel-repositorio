name: Export Content Hub Item to Repo

on:
  workflow_dispatch:
    inputs:
      content_name:
        description: 'Content name (displayName). Ej: Brute force attack against a Cloud PC'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

env:
  SENTINEL_RESOURCE_GROUP: ${{ vars.SENTINEL_RESOURCE_GROUP }}
  SENTINEL_WORKSPACE_NAME: ${{ vars.SENTINEL_WORKSPACE_NAME }}

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Az PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name "PSGallery" -InstallationPolicy Trusted
          Install-Module Az.Accounts -Force
          # Az.Resources suele ser útil para context; no es estrictamente necesario pero ayuda
          Install-Module Az.Resources -Force

      - name: Export content item to repo structure
        shell: pwsh
        run: |
          ./Scripts/Export-ContentHubItemToRepo.ps1 `
            -ContentName "${{ github.event.inputs.content_name }}"

      - name: Commit & Push if changes
        shell: bash
        run: |
          set -e
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Export Sentinel content: ${{ github.event.inputs.content_name }}"
            git push
          else
            echo "No hay cambios para commitear."
          fi
