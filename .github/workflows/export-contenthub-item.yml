name: Export Content Hub Item to Repo (Repo-ready type)

on:
  workflow_dispatch:
    inputs:
      contentType:
        description: "Tipo: Analytics rules | Hunting queries | Parsers | Workbooks | Playbooks"
        required: true
        default: "Analytics rules"
      solutionName:
        description: "Carpeta solución. Ej: Azure Key Vault"
        required: true
        default: "Azure Key Vault"
      itemName:
        description: "Nombre fichero. Ej: Mass secret retrieval from Azure Key Vault"
        required: true
        default: "Mass secret retrieval from Azure Key Vault"
      templateId:
        description: "Path bajo providers/Microsoft.SecurityInsights/. Ej: AlertRuleTemplates/<id>"
        required: true
        default: "AlertRuleTemplates/Mass secret retrieval from Azure Key Vault"
      apiVersion:
        description: "API version SecurityInsights"
        required: false
        default: "2023-11-01-preview"
      force:
        description: "Sobreescribir (true/false)"
        required: false
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Export item and rewrite type for Repositories
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"

            $subscriptionId = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            $resourceGroup  = "${{ vars.RESOURCE_GROUP }}"
            $workspaceName  = "${{ vars.WORKSPACE_NAME }}"

            if ([string]::IsNullOrWhiteSpace($workspaceName)) {
              throw "WORKSPACE_NAME está vacío/no definido en Variables de Actions."
            }

            $contentType  = "${{ github.event.inputs.contentType }}"
            $solutionName = "${{ github.event.inputs.solutionName }}"
            $itemName     = "${{ github.event.inputs.itemName }}"
            $templateId   = "${{ github.event.inputs.templateId }}"
            $apiVersion   = "${{ github.event.inputs.apiVersion }}"
            $force        = "${{ github.event.inputs.force }}"

            $forceSwitch = $false
            if ($force -and $force.ToLower() -eq "true") { $forceSwitch = $true }

            Set-AzContext -SubscriptionId $subscriptionId | Out-Null

            $args = @{
              SubscriptionId = $subscriptionId
              ResourceGroup  = $resourceGroup
              WorkspaceName  = $workspaceName
              ContentType    = $contentType
              SolutionName   = $solutionName
              ItemName       = $itemName
              TemplateId     = $templateId
              ApiVersion     = $apiVersion
              OutputRoot     = "${{ github.workspace }}"
            }

            if ($forceSwitch) { $args["Force"] = $true }

            & "${{ github.workspace }}/scripts/Export-ContentHubItemToRepo.ps1" @args

      - name: Commit and push changes
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi

          git commit -m "Add Sentinel content (repo-ready type): ${{ github.event.inputs.itemName }}"
          git push
