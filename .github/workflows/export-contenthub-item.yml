name: Export Content Hub Item (ScheduledRule style)

on:
  workflow_dispatch:
    inputs:
      contentType:
        description: "Analytics rules | Hunting queries | Parsers | Workbooks | Playbooks"
        required: true
        default: "Analytics rules"
      solutionName:
        description: "Nombre exacto de la solución en Content Hub"
        required: true
        default: "Azure Key Vault"
      itemName:
        description: "Nombre exacto del item (displayName) en el packagedContent"
        required: true
        default: "Mass secret retrieval from Azure Key Vault"
      apiVersion:
        description: "API version SecurityInsights"
        required: false
        default: "2025-09-01"
      force:
        description: "Sobreescribir archivo si existe (true/false)"
        required: false
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Debug vars
        run: |
          echo "RESOURCE_GROUP=${{ vars.RESOURCE_GROUP }}"
          echo "WORKSPACE_NAME=${{ vars.WORKSPACE_NAME }}"

      - name: Export Content Hub item (ScheduledRule style)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $args = @{
            SubscriptionId = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            ResourceGroup  = "${{ vars.RESOURCE_GROUP }}"
            WorkspaceName  = "${{ vars.WORKSPACE_NAME }}"
            ContentType    = "${{ github.event.inputs.contentType }}"
            SolutionName   = "${{ github.event.inputs.solutionName }}"
            ItemName       = "${{ github.event.inputs.itemName }}"
            ApiVersion     = "${{ github.event.inputs.apiVersion }}"
            OutputRoot     = "${{ github.workspace }}"
          }

          if ("${{ github.event.inputs.force }}".ToLower() -eq "true") { $args["Force"] = $true }

          ./scripts/Export-ContentHubItemToRepo.ps1 @args

      - name: Commit and push changes
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi
          git commit -m "Export Sentinel item (ScheduledRule style): ${{ github.event.inputs.itemName }}"
          git push
