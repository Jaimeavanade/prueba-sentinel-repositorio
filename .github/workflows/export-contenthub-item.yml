name: Export Content Hub Item to Repo (Repo-ready)

on:
  workflow_dispatch:
    inputs:
      contentType:
        required: true
        default: "Analytics rules"
      solutionName:
        required: true
        default: "Azure Key Vault"
      itemName:
        required: true
        default: "Mass secret retrieval from Azure Key Vault"
      force:
        required: false
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Debug vars
        run: |
          echo "RESOURCE_GROUP=${{ vars.RESOURCE_GROUP }}"
          echo "WORKSPACE_NAME=${{ vars.WORKSPACE_NAME }}"

      - name: Export Content Hub item
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $args = @{
            SubscriptionId = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            ResourceGroup  = "${{ vars.RESOURCE_GROUP }}"
            WorkspaceName  = "${{ vars.WORKSPACE_NAME }}"
            ContentType    = "${{ github.event.inputs.contentType }}"
            SolutionName   = "${{ github.event.inputs.solutionName }}"
            ItemName       = "${{ github.event.inputs.itemName }}"
            OutputRoot     = "${{ github.workspace }}"
          }

          if ("${{ github.event.inputs.force }}" -eq "true") {
            $args["Force"] = $true
          }

          ./scripts/Export-ContentHubItemToRepo.ps1 @args

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add Sentinel content (repo-ready)"
          git push
