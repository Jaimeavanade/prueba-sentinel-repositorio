name: Export Content Hub item to Sentinel Repo

on:
  workflow_dispatch:
    inputs:
      contentName:
        description: 'Content name (displayName). Ej: Brute force attack against a Cloud PC'
        required: true
        type: string
      subscriptionId:
        description: 'Azure Subscription ID del workspace de Sentinel'
        required: true
        type: string
      resourceGroup:
        description: 'Resource Group del workspace de Sentinel'
        required: true
        type: string
      workspaceName:
        description: 'Log Analytics Workspace name (Sentinel)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  export:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Export & Normalize Content Hub item
        shell: pwsh
        run: |
          ./Scripts/Export-ContentHubItemToRepo.ps1 `
            -SubscriptionId "${{ github.event.inputs.subscriptionId }}" `
            -ResourceGroupName "${{ github.event.inputs.resourceGroup }}" `
            -WorkspaceName "${{ github.event.inputs.workspaceName }}" `
            -ContentName "${{ github.event.inputs.contentName }}"

      - name: Commit & Push changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          # Si no hay cambios, no comitea
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No hay cambios para commitear."
            exit 0
          }

          git commit -m "Export Sentinel content: ${{ github.event.inputs.contentName }}"
          git push
