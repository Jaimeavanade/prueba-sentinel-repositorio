name: Export Content Hub Item to Repo (Repo-ready type)

on:
  workflow_dispatch:
    inputs:
      contentType:
        description: "Analytics rules | Hunting queries | Parsers | Workbooks | Playbooks"
        required: true
        default: "Analytics rules"
      solutionName:
        description: "Nombre de la solución (Content Hub) - exacto"
        required: true
        default: "Azure Key Vault"
      itemName:
        description: "Nombre del item (displayName) - exacto"
        required: true
        default: "Mass secret retrieval from Azure Key Vault"
      apiVersion:
        description: "API version"
        required: false
        default: "2025-09-01"
      force:
        description: "Sobreescribir fichero si existe (true/false)"
        required: false
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Export Content Hub item
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "=== Inputs ==="
          Write-Host "contentType=${{ github.event.inputs.contentType }}"
          Write-Host "solutionName=${{ github.event.inputs.solutionName }}"
          Write-Host "itemName=${{ github.event.inputs.itemName }}"
          Write-Host "apiVersion=${{ github.event.inputs.apiVersion }}"
          Write-Host "force=${{ github.event.inputs.force }}"

          # Fijar subscripción en az (por si acaso)
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          $args = @{
            SubscriptionId = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            ResourceGroup  = "${{ vars.RESOURCE_GROUP }}"
            WorkspaceName  = "${{ vars.WORKSPACE_NAME }}"
            ContentType    = "${{ github.event.inputs.contentType }}"
            SolutionName   = "${{ github.event.inputs.solutionName }}"
            ItemName       = "${{ github.event.inputs.itemName }}"
            ApiVersion     = "${{ github.event.inputs.apiVersion }}"
            OutputRoot     = "${{ github.workspace }}"
          }

          if ("${{ github.event.inputs.force }}".ToLower() -eq "true") {
            $args["Force"] = $true
          }

          & "${{ github.workspace }}/scripts/Export-ContentHubItemToRepo.ps1" @args

      - name: Commit and push changes
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi
          git commit -m "Add Sentinel content (repo-ready): ${{ github.event.inputs.itemName }}"
          git push
